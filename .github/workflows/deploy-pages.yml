name: Deploy to GitHub Pages

# 推到呢條 branch 或 main 都會自動部署；亦可以喺 Actions 頁手動觸發。
on:
  push:
    branches:
      - main
      - claude/mobile-fft-demo-redesign-dW0Qs
  workflow_dispatch:

# 俾 deploy-pages 所需嘅權限。
permissions:
  contents: read
  pages: write
  id-token: write

# 同一時間只跑一個部署，新嘅排隊唔取消進行中嘅。
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # enablement: true 會喺第一次跑時自動幫個 repo 開啟 Pages。
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # 成個 repo 根目錄就係靜態網站（index.html 喺根）。
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
